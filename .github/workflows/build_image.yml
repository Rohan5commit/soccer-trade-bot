name: Build Training Image

on:
  workflow_dispatch:
  push:
    paths:
      - 'Dockerfile'
      - 'infra/requirements.txt'
      - 'model/**'
      - 'vision/**'
      - 'data/**'
      - 'config.py'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=training
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Output image reference
        run: |
          echo "========================================="
          echo "Image pushed successfully!"
          echo ""
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:training"
          echo ""
          echo "To create OVH AI Training job:"
          echo "  1. Go to https://console.ovh.com/ai-training"
          echo "  2. Click 'Create a job'"
          echo "  3. Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:training"
          echo "  4. Flavor: h100-1 (or h100-360 for more VRAM)"
          echo "  5. Command: python -m model.train"
          echo "  6. Submit"
          echo "========================================="
