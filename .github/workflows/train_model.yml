name: Train Model (OVH AI Training)

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: 'OVH GPU flavor'
        required: false
        default: 'h100-1'
        type: choice
        options:
          - 'h100-1'
          - 'h100-3'
          - 'a100-1'
          - 'a100-2'
      region:
        description: 'OVH region'
        required: false
        default: 'GRA'
        type: choice
        options:
          - 'GRA'
          - 'BHS'
      command:
        description: 'Command to run (default: model.train)'
        required: false
        default: 'python -m model.train'
      timeout:
        description: 'Job timeout in hours'
        required: false
        default: '24'

env:
  OVH_IMAGE: ghcr.io/${{ github.repository }}:training

jobs:
  submit-training:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ovhai CLI
        run: |
          curl -s https://cli.gra.ai.cloud.ovh.net/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Authenticate ovhai
        env:
          OVH_AI_TOKEN: ${{ secrets.OVH_AI_TOKEN }}
        run: |
          ovhai config set ${{ github.event.inputs.region || 'GRA' }}
          echo "$OVH_AI_TOKEN" | ovhai login --token-stdin

      - name: Verify auth and list jobs
        run: |
          ovhai job list --output json | python3 -m json.tool 2>/dev/null | head -20

      - name: Submit AI Training job
        id: submit
        env:
          OVH_FLAVOR: ${{ github.event.inputs.flavor || 'h100-1' }}
          OVH_COMMAND: ${{ github.event.inputs.command || 'python -m model.train' }}
          OVH_TIMEOUT: ${{ github.event.inputs.timeout || '24' }}
        run: |
          echo "Submitting training job..."
          echo "  Image: $OVH_IMAGE"
          echo "  Flavor: $OVH_FLAVOR"
          echo "  Command: $OVH_COMMAND"
          echo "  Timeout: ${OVH_TIMEOUT}h"

          JOB_OUTPUT=$(ovhai job run "$OVH_IMAGE" \
            --gpu 1 \
            --flavor "$OVH_FLAVOR" \
            --timeout "$((OVH_TIMEOUT * 3600))" \
            --command "$OVH_COMMAND" \
            --output json 2>&1)

          echo "$JOB_OUTPUT" | python3 -m json.tool 2>/dev/null || echo "$JOB_OUTPUT"

          JOB_ID=$(echo "$JOB_OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null)
          echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT

          if [ -z "$JOB_ID" ]; then
            echo "ERROR: Failed to extract job ID"
            echo "$JOB_OUTPUT"
            exit 1
          fi

          echo "Job submitted: $JOB_ID"

      - name: Wait for job to start
        run: |
          JOB_ID="${{ steps.submit.outputs.job_id }}"
          echo "Waiting for job $JOB_ID to leave INITIAL state..."
          for i in $(seq 1 30); do
            STATUS=$(ovhai job get "$JOB_ID" --output json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null)
            echo "  [$i/30] Status: $STATUS"
            if [ "$STATUS" != "INITIAL" ] && [ "$STATUS" != "" ]; then
              echo "Job entered state: $STATUS"
              break
            fi
            sleep 10
          done

      - name: Stream training logs
        run: |
          JOB_ID="${{ steps.submit.outputs.job_id }}"
          echo "Streaming logs for job $JOB_ID..."
          echo "(Logs will appear as the job runs)"
          ovhai job logs "$JOB_ID" --follow --timeout 30 || true

      - name: Poll job status
        run: |
          JOB_ID="${{ steps.submit.outputs.job_id }}"
          echo "Polling job $JOB_ID status..."

          while true; do
            STATUS=$(ovhai job get "$JOB_ID" --output json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null)
            echo "[$(date -u +%H:%M:%S)] Status: $STATUS"

            case "$STATUS" in
              TERMINATED)
                echo "Job completed successfully!"
                break
              ;;
              FAILED|ERROR|CANCELED)
                echo "Job ended with status: $STATUS"
                ovhai job get "$JOB_ID" --output json 2>/dev/null | python3 -m json.tool
                exit 1
              ;;
              *)
                sleep 60
              ;;
            esac
          done

      - name: Download model artifacts
        run: |
          JOB_ID="${{ steps.submit.outputs.job_id }}"
          mkdir -p model

          echo "Listing job outputs..."
          ovhai job get "$JOB_ID" --output json 2>/dev/null | python3 -m json.tool 2>/dev/null | head -30

      - name: Upload artifacts to GitHub
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trained-models-${{ github.run_number }}
          path: model/
          retention-days: 30
